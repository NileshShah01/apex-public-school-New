<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Apex Public School</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: var(--bg-gray);
            color: var(--text-main);
        }

        .page-header {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        /* LIGHTBOX */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }

        .lightbox-buttons {
            display: flex;
            gap: 1rem;
        }

        .lightbox-buttons button {
            padding: 0.75rem 2rem;
            border: none;
            background: var(--primary);
            color: var(--white);
            cursor: pointer;
            border-radius: 0.5rem;
            font-weight: 700;
            transition: 0.3s;
        }

        .lightbox-buttons button:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .close-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 2.5rem;
            color: var(--white);
            cursor: pointer;
            opacity: 0.8;
            transition: 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
    </style>

</head>


<body>

<div id="header"></div>


<section class="page-header">
    <h1 id="galleryHeaderTitle">School Gallery</h1>
    <p id="galleryHeaderSubtitle">Memories from school events and activities</p>
</section>


<section class="reveal">
    <h2 class="section-title">Photo Gallery</h2>
    
    <!-- Dynamic Category Filters -->
    <div id="galleryFilters" style="display:flex; justify-content:center; gap:0.75rem; flex-wrap:wrap; margin-bottom:3rem;">
        <button class="filter-btn active" data-filter="Sports">Sports</button>
        <button class="filter-btn" data-filter="Events">Events</button>
        <button class="filter-btn" data-filter="Museum">Bihar Museum</button>
        <button class="filter-btn" data-filter="Science">Science Center</button>
        <button class="filter-btn" data-filter="Trip">School Trip</button>
        <button class="filter-btn" data-filter="Functions">Functions</button>
        <button class="filter-btn" data-filter="Awards">Awards</button>
        <button class="filter-btn" data-filter="Facilities">Facilities</button>
        <button class="filter-btn" data-filter="Others">Others</button>
    </div>

    <div class="grid" id="galleryDynamicGrid">
        <!-- Loaded automatically by CMS -->
        <p class="text-muted" style="text-align:center; padding:5rem; width:100%;">Loading school gallery...</p>
    </div>
</section>


<div id="lightbox">

<span class="close-btn" onclick="closeLightbox()">×</span>

<img id="lightbox-img">

<div class="lightbox-buttons">

<button onclick="downloadImage()">Download</button>

<button onclick="closeLightbox()">Close</button>

</div>

</div>


<div id="footer"></div>
<!-- NEW FLOATING BUTTONS CONTAINER -->
<div id="floating-button"></div>



<script src="script.js"></script>
<!-- Firebase SDK for CMS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/cms-settings.js"></script>


<script>

let currentImage = ""

function openLightbox(img) {
    // Handle both HTML element and object {src: '...'}
    currentImage = img.src || img;
    const lightboxImg = document.getElementById("lightbox-img");
    if (!lightboxImg) return;
    
    lightboxImg.src = currentImage;
    const lightbox = document.getElementById("lightbox");
    if (lightbox) {
        lightbox.style.display = "flex";
        document.body.style.overflow = "hidden"; // Prevent scroll
    }
}

function closeLightbox() {
    const lightbox = document.getElementById("lightbox");
    if (lightbox) {
        lightbox.style.display = "none";
        document.body.style.overflow = "auto";
    }
}

async function downloadImage() {
    if (!currentImage) return;
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "Downloading...";
    btn.disabled = true;

    try {
        const response = await fetch(currentImage);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "apex-gallery-" + Date.now() + ".jpg";
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        a.remove();
    } catch (e) {
        console.error("Download failed:", e);
        // Fallback: open in new tab
        window.open(currentImage, '_blank');
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}



</script>

</body>

</html>
