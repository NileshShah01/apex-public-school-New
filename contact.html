<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Apex Public School</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BACKGROUND */

body
{
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
background-size:cover;
background-attachment:fixed;
background-position:center;
}


/* PAGE HEADER */

.page-header
{
text-align:center;
padding:60px 20px;
background:rgba(255,255,255,0.92);
}

.page-header h1
{
font-size:38px;
color:#1E40AF;
}


/* SECTION */

.section
{
max-width:1100px;
margin:auto;
padding:50px 20px;
background:rgba(255,255,255,0.95);
border-radius:6px;
margin-bottom:30px;
}


/* GRID */

.grid
{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}


/* CONTACT CARD */

.contact-card
{
background:white;
padding:25px;
text-align:center;
border-radius:6px;
box-shadow:0 6px 14px rgba(0,0,0,0.12);
transition:0.3s;
}

.contact-card:hover
{
transform:translateY(-8px);
}

.contact-card i
{
font-size:36px;
color:#1E40AF;
margin-bottom:10px;
}


/* SOCIAL ICONS */

.social
{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.social a
{
font-size:26px;
color:#1E40AF;
transition:0.3s;
}

.social a:hover
{
color:#2563EB;
transform:scale(1.2);
}


/* GOOGLE FORM */

.form-box iframe
{
width:100%;
border:none;
border-radius:2px;
}

</style>

</head>


<body>

<div id="header"></div>


<section class="page-header">

<h1 id="contactHeaderTitle">Contact Apex Public School</h1>

<p id="contactHeaderSubtitle">Anjani Bazar, Parsa, Saran</p>

</section>



<section class="section">

<h2>Contact Information</h2>

<div class="grid">

<div class="contact-card">

<i class="fa-solid fa-phone"></i>

<h3>Phone</h3>

<p>8084243031</p>

</div>


<div class="contact-card">

<i class="fa-solid fa-envelope"></i>

<h3>Email</h3>

<p>Apexpublicschool61@gmail.com</p>

</div>


<div class="contact-card">

<i class="fa-solid fa-location-dot"></i>

<h3>Address</h3>

<p id="contactAddress">
Anjani Bazar  
Near SBI Branch  
Parsa, Saran  
Bihar 841219
</p>

</div>


<div class="contact-card">

<i class="fa-solid fa-clock"></i>

<h3>Office Hours</h3>

<p>
Monday – Saturday  
9:00 AM – 2:30 PM
</p>

</div>

</div>

</section>



<section class="section">

<h2>Send Inquiry</h2>

<div class="form-box">
<form id="contactForm" style="display:grid; gap:18px;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
        <div>
            <label style="font-weight:600; display:block; margin-bottom:6px;">Name <span style="color:red">*</span></label>
            <input type="text" id="con_name" required placeholder="Your name" style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px; font-size:15px;">
        </div>
        <div>
            <label style="font-weight:600; display:block; margin-bottom:6px;">Mobile Number <span style="color:red">*</span></label>
            <input type="tel" id="con_mobile" required placeholder="10-digit number" maxlength="10" style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px; font-size:15px;">
        </div>
    </div>
    <div>
        <label style="font-weight:600; display:block; margin-bottom:6px;">Message / Inquiry <span style="color:red">*</span></label>
        <textarea id="con_message" required rows="4" placeholder="How can we help you?" style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px; font-size:15px; resize:vertical;"></textarea>
    </div>
    <div id="con_status" style="display:none; padding:14px; border-radius:8px; font-weight:600; text-align:center;"></div>
    <button type="submit" style="background:#1E40AF; color:white; padding:14px 30px; border:none; border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; transition:0.3s;" onmouseover="this.style.background='#2563EB'" onmouseout="this.style.background='#1E40AF'">
        <i class="fa-solid fa-paper-plane"></i> Send Message
    </button>
</form>
</div>

</section>



<section class="section">

<h2>Follow Us</h2>

<div class="social">

<a href="#"><i class="fa-brands fa-facebook"></i></a>

<a href="#"><i class="fa-brands fa-instagram"></i></a>

<a href="#"><i class="fa-brands fa-youtube"></i></a>

</div>

</section>



<div id="footer"></div>


<!-- NEW FLOATING BUTTONS CONTAINER -->
<script src="script.js"></script>

<!-- Firebase SDK for Inquiry Sync -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
document.getElementById('contactForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    const status = document.getElementById('con_status');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    status.style.display = 'none';

    const mobile = document.getElementById('con_mobile').value.trim();
    if (mobile.length !== 10 || isNaN(mobile)) {
        status.style.display = 'block';
        status.style.background = '#fff1f2';
        status.style.color = '#be123c';
        status.textContent = 'Please enter a valid 10-digit mobile number.';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Message';
        return;
    }

    try {
        await db.collection('inquiries').add({
            parent: document.getElementById('con_name').value.trim(),
            student: 'N/A (General Contact)',
            mobile: mobile,
            class: 'N/A',
            village: 'N/A',
            message: document.getElementById('con_message').value.trim(),
            status: 'New',
            submittedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        status.style.display = 'block';
        status.style.background = '#ecfdf5';
        status.style.color = '#065f46';
        status.textContent = '✅ Message sent successfully! We will contact you soon.';
        this.reset();
    } catch(err) {
        status.style.display = 'block';
        status.style.background = '#fff1f2';
        status.style.color = '#be123c';
        status.textContent = 'Failed to send message. Please try calling us instead.';
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Message';
    }
});
</script>


<script>

/* BACKGROUND MOUSE MOVEMENT */

document.addEventListener("mousemove", e => {

let x = e.clientX / window.innerWidth
let y = e.clientY / window.innerHeight

document.body.style.backgroundPosition = `${x*70}px ${y*70}px`

})

</script>


</body>

</html>
