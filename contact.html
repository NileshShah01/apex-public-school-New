<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Apex Public School</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BACKGROUND */

body
{
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
background-size:cover;
background-attachment:fixed;
background-position:center;
}


/* PAGE HEADER */

.page-header
{
text-align:center;
padding:60px 20px;
background:rgba(255,255,255,0.92);
}

.page-header h1
{
font-size:38px;
color:#1E40AF;
}


/* SECTION */

.section
{
max-width:1100px;
margin:auto;
padding:50px 20px;
background:rgba(255,255,255,0.95);
border-radius:6px;
margin-bottom:30px;
}


/* GRID */

.grid
{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}


/* CONTACT CARD */

.contact-card
{
background:white;
padding:25px;
text-align:center;
border-radius:6px;
box-shadow:0 6px 14px rgba(0,0,0,0.12);
transition:0.3s;
}

.contact-card:hover
{
transform:translateY(-8px);
}

.contact-card i
{
font-size:36px;
color:#1E40AF;
margin-bottom:10px;
}


/* SOCIAL ICONS */

.social
{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.social a
{
font-size:26px;
color:#1E40AF;
transition:0.3s;
}

.social a:hover
{
color:#2563EB;
transform:scale(1.2);
}


/* GOOGLE FORM */

.form-box iframe
{
width:100%;
border:none;
border-radius:2px;
}

</style>

</head>


<body>

<div id="header"></div>


<section class="page-header">

<h1>Contact Apex Public School</h1>

<p>Anjani Bazar, Parsa, Saran</p>

</section>



<section class="section">

<h2>Contact Information</h2>

<div class="grid">

<div class="contact-card">

<i class="fa-solid fa-phone"></i>

<h3>Phone</h3>

<p>8084243031</p>

</div>


<div class="contact-card">

<i class="fa-solid fa-envelope"></i>

<h3>Email</h3>

<p>Apexpublicschool61@gmail.com</p>

</div>


<div class="contact-card">

<i class="fa-solid fa-location-dot"></i>

<h3>Address</h3>

<p>
Anjani Bazar  
Near SBI Branch  
Parsa, Saran  
Bihar 841219
</p>

</div>


<div class="contact-card">

<i class="fa-solid fa-clock"></i>

<h3>Office Hours</h3>

<p>
Monday – Saturday  
9:00 AM – 2:30 PM
</p>

</div>

</div>

</section>



<section class="section">

<h2>Send Inquiry</h2>

<div class="form-box">

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdBNze-zGc4b8n-iWuE0Iovxoz6ZTXc8mEIZyq120pNseQ3cA/viewform?embedded=true" height="1660">

Loading…

</iframe>

</div>

</section>



<section class="section">

<h2>Follow Us</h2>

<div class="social">

<a href="#"><i class="fa-brands fa-facebook"></i></a>

<a href="#"><i class="fa-brands fa-instagram"></i></a>

<a href="#"><i class="fa-brands fa-youtube"></i></a>

</div>

</section>



<div id="footer"></div>


<!-- NEW FLOATING BUTTONS CONTAINER -->
<div id="floating-button"></div>



<script src="script.js"></script>


<script>

/* BACKGROUND MOUSE MOVEMENT */

document.addEventListener("mousemove", e => {

let x = e.clientX / window.innerWidth
let y = e.clientY / window.innerHeight

document.body.style.backgroundPosition = `${x*70}px ${y*70}px`

})

</script>


</body>

</html>
