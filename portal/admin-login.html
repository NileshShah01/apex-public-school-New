<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="portalTitle">Admin Login</title>
        <link rel="stylesheet" href="../css/portal.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    </head>
    <body class="auth-page">
        <div class="auth-card">
            <div class="portal-logo text-center mb-8">
                <div id="schoolLogoContainer">
                    <i class="fas fa-user-shield text-3xl color-accent mb-4"></i>
                </div>
                <h2 class="text-2xl color-secondary fw-800" id="portalBrandName">Admin Portal</h2>
                <p class="text-muted-p" id="portalDesc">Secure access for school administrators</p>
            </div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-muted-p"></i>
                        <input
                            type="email"
                            id="email"
                            placeholder="admin@example.com"
                            required
                            class="pl-10"
                        />
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-muted-p"></i>
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required
                            class="pl-10"
                        />
                    </div>
                </div>
                <button
                    type="submit"
                    class="btn-portal btn-primary w-full flex-center mt-4 p-3"
                >
                    <i class="fas fa-sign-in-alt"></i> Login to Admin
                </button>
                <div
                    id="loginError"
                    class="text-error bg-error text-center mt-4 p-2 rounded-lg hidden"
                ></div>
            </form>
            <div class="portal-footer text-center mt-8 pt-4 border-t">
                <a href="../school.html" class="btn-back"> <i class="fas fa-arrow-left"></i> Back to Website </a>
            </div>
        </div>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
        <script src="../js/firebase-config.js"></script>
        <script src="../js/admin-auth.js"></script>
    </body>
</html>
