<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="portalTitle">Student Login</title>
        <link rel="stylesheet" href="../css/portal.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    </head>
    <body class="auth-page">
        <div class="auth-card">
            <div class="portal-logo text-center mb-8">
                <div id="schoolLogoContainer">
                    <i class="fas fa-user-graduate text-3xl color-primary mb-4"></i>
                </div>
                <h2 class="text-2xl color-secondary fw-800" id="portalBrandName">Student Portal</h2>
                <p class="text-muted-p" id="portalDesc">Access your school account</p>
            </div>
            <form id="studentLoginForm">
                <div class="form-group">
                    <label for="student_phone">Mobile Number</label>
                    <div class="relative">
                        <i class="fas fa-mobile-alt absolute left-4 top-1/2 -translate-y-1/2 text-muted-p"></i>
                        <input
                            type="text"
                            id="student_phone"
                            placeholder="Enter your mobile number"
                            required
                            class="pl-10"
                            maxlength="10"
                        />
                    </div>
                </div>
                <div class="form-group">
                    <label for="student_name">Student's Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-muted-p"></i>
                        <input
                            type="text"
                            id="student_name"
                            placeholder="Enter student's full name"
                            required
                            class="pl-10"
                        />
                    </div>
                </div>
                <button
                    type="submit"
                    class="btn-portal btn-primary w-full flex-center mt-4 p-3"
                >
                    <i class="fas fa-sign-in-alt"></i> Login Securely
                </button>
                <div
                    id="loginError"
                    class="text-error bg-error text-center mt-4 p-2 rounded-lg hidden"
                ></div>
            </form>
            <div class="portal-footer text-center mt-8 pt-4 border-t">
                <a
                    href="../school.html"
                    class="color-primary no-decoration fw-600 d-inline-flex align-items-center gap-sm"
                >
                    <i class="fas fa-arrow-left"></i> Back to Website
                </a>
            </div>
        </div>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
        <script src="../js/firebase-config.js"></script>
        <script src="../js/student-auth.js"></script>
    </body>
</html>
